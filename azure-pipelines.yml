# Lab 2 — Build, Test, and Publish a .NET 8 Web API

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**

variables:
  buildConfiguration: Release
  dotnetVersion: 8.0.x
  solution: '**/*.sln'

pool:
  name: Ado-labs

stages:
  # ----------------------------------------------------------------------
  # 1. Build — restore, build, publish artefact
  # ----------------------------------------------------------------------
  - stage: Build
    displayName: Build solution
    jobs:
      - job: BuildJob
        displayName: Restore, build, publish
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              version: $(dotnetVersion)
              includePreviewVersions: false

          # NuGet package cache — keyed on the lock files.
          # If the key matches a previous run, packages are restored from cache.
          - task: Cache@2
            displayName: Cache NuGet packages
            inputs:
              key: 'nuget | "$(Agent.OS)" | **/packages.lock.json'
              restoreKeys: |
                nuget | "$(Agent.OS)"
              path: $(NUGET_PACKAGES)
            env:
              NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: '**/*.csproj'
              feedsToUse: select
              arguments: --locked-mode

          - task: DotNetCoreCLI@2
            displayName: Build
            inputs:
              command: build
              projects: '**/*.csproj'
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: DotNetCoreCLI@2
            displayName: Publish API
            inputs:
              command: publish
              projects: src/CloudLaunch.Api/CloudLaunch.Api.csproj
              arguments: --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/app
              publishWebProjects: false
              zipAfterPublish: true
              modifyOutputPath: false

          - task: PublishPipelineArtifact@1
            displayName: Publish build artefact
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/app
              artifact: cloudlaunch-api
              publishLocation: pipeline

  # ----------------------------------------------------------------------
  # 2. Test — run xUnit tests (in parallel via matrix), publish results
  # ----------------------------------------------------------------------
  - stage: Test
    displayName: Run tests
    dependsOn: Build
    jobs:
      - job: TestJob
        displayName: xUnit
        strategy:
          matrix:
            net8:
              targetFramework: net8.0
          maxParallel: 2
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              version: $(dotnetVersion)

          - task: Cache@2
            displayName: Restore NuGet cache
            inputs:
              key: 'nuget | "$(Agent.OS)" | **/packages.lock.json'
              restoreKeys: |
                nuget | "$(Agent.OS)"
              path: $(NUGET_PACKAGES)
            env:
              NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: '**/*.Tests.csproj'
              feedsToUse: select
              arguments: --locked-mode

          - task: DotNetCoreCLI@2
            displayName: Run tests with coverage
            inputs:
              command: test
              projects: '**/*.Tests.csproj'
              arguments: >-
                --configuration $(buildConfiguration)
                --framework $(targetFramework)
                --collect:"XPlat Code Coverage"
                --logger trx
                --results-directory $(Agent.TempDirectory)/TestResults
              publishTestResults: false

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/*.trx'
              testRunTitle: 'xUnit ($(targetFramework))'
              mergeTestResults: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish coverage
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
              pathToSources: $(Build.SourcesDirectory)/src